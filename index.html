<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Анонимные Вопросы — Узнать кто</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://widget.cloudpayments.ru/bundles/cloudpayments.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f1b2d 0%, #1a2744 40%, #243b6e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 20px 300px 20px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '🎭 ❓ 👤 🕵️ 💬 ❓ 🎭 👻 ❓ 💬 🎭 ❓ 👤 🕵️ 💬 ❓ 🎭 👻 ❓ 💬 🎭 ❓ 👤 🕵️ 💬 🎭 👻 ❓ 💬 🎭 ❓ 👤 🕵️ 💬 ❓ 🎭 👻';
      position: fixed;
      top: 0; left: 0;
      width: 200%;
      height: 200%;
      font-size: 28px;
      line-height: 80px;
      letter-spacing: 40px;
      word-spacing: 30px;
      opacity: 0.06;
      pointer-events: none;
      transform: rotate(-15deg) translate(-10%, -10%);
      z-index: 0;
      white-space: pre-wrap;
    }
    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 32px 20px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
      position: relative;
      z-index: 1;
      backdrop-filter: blur(10px);
    }
    .card-header { font-size: 36px; margin-bottom: 6px; }
    .card-title { font-size: 17px; font-weight: 700; color: #1a2744; margin-bottom: 20px; }
    .info-box {
      background: #f0f4ff;
      border: 1.5px solid #c8d6f0;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 20px;
      text-align: left;
    }
    .info-box .info-title { font-size: 15px; font-weight: 700; color: #1a2744; margin-bottom: 12px; }
    .info-box .info-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; color: #444; margin-bottom: 8px; line-height: 1.4;
    }
    .info-box .info-row:last-child { margin-bottom: 0; }
    .info-box .info-row .icon { font-size: 18px; flex-shrink: 0; }
    .info-box .info-row b { color: #1a2744; }
    .email-input {
      width: 100%; padding: 16px;
      border: 1.5px solid #c8d6f0; border-radius: 14px;
      font-size: 15px; margin-bottom: 16px; outline: none;
      transition: border 0.2s; background: #f8faff;
    }
    .email-input:focus { border-color: #4a7cf7; }
    .checkbox-row {
      display: flex; align-items: flex-start; gap: 10px;
      text-align: left; margin-bottom: 14px; padding: 0 4px;
    }
    .checkbox-row input[type="checkbox"] {
      margin-top: 3px; width: 18px; height: 18px;
      flex-shrink: 0; accent-color: #4a7cf7;
    }
    .checkbox-row label { font-size: 13px; color: #555; line-height: 1.4; }
    .checkbox-row label a { color: #4a7cf7; text-decoration: underline; }
    .pay-btn {
      background: linear-gradient(135deg, #4a7cf7, #3461d1);
      color: white; border: none; border-radius: 16px;
      padding: 18px 32px; font-size: 18px; font-weight: 700;
      width: 100%; cursor: pointer; margin-bottom: 10px;
      transition: opacity 0.2s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 16px rgba(74,124,247,0.4);
    }
    .pay-btn:hover { transform: translateY(-1px); }
    .pay-btn:active { transform: translateY(0); }
    .pay-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .price-note { font-size: 12px; color: #aaa; margin-top: 4px; }
    .result-block { display: none; }
    .result-emoji { font-size: 56px; margin-bottom: 12px; }
    .success-badge {
      background: #e8f5e9; color: #2e7d32; border-radius: 12px;
      padding: 14px 20px; font-size: 15px; font-weight: 600; margin: 16px 0;
    }
    .subtitle { font-size: 15px; color: #888; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div id="before-pay">
      <div class="card-header">🕵️‍♂️</div>
      <div class="card-title">Узнай кто написал</div>

      <div class="info-box">
        <div class="info-title">📋 Что вы покупаете:</div>
        <div class="info-row"><span class="icon">🔓</span> Открытие имени отправителя</div>
        <div class="info-row"><span class="icon">👑</span> 1 день — <b>19 ₽</b></div>
        <div class="info-row"><span class="icon">🔄</span> Далее — <b>499 ₽/день</b></div>
        <div class="info-row"><span class="icon">🚫</span> Отмена — <b>/unsubscribe</b></div>
      </div>

      <input type="email" id="email-input" class="email-input" placeholder="Ваш email для чека" required>

      <div class="checkbox-row">
        <input type="checkbox" id="agree-terms">
        <label for="agree-terms">Я согласен с <a href="https://graph.org/PUBLICHNAYA-OFERTA-POLZOVATELSKOE-SOGLASHENIE-03-31" target="_blank">офертой</a> и <a href="https://graph.org/POLITIKA-KONFIDENCIALNOSTI-03-31-70" target="_blank">политикой конфиденциальности</a></label>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="agree-recurrent">
        <label for="agree-recurrent">Я согласен на автоматическое списание <b>499 ₽</b> через 24 часа с последующим премиум-доступом на <b>5 дней</b></label>
      </div>

      <button class="pay-btn" id="pay-btn" onclick="startPayment()">
        🔓 Узнать за 19 ₽
      </button>
      <p class="price-note">Email нужен для отмены подписки</p>
    </div>

    <div class="result-block" id="after-pay">
      <div class="result-emoji">✅</div>
      <h1>Оплата прошла!</h1>
      <div class="success-badge">Имя придёт в бот через несколько секунд</div>
      <p class="subtitle">Проверь чат с ботом!</p>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    document.getElementById('email-input').addEventListener('focus', function() {
      setTimeout(() => this.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
    });

    const params = new URLSearchParams(window.location.search);
    const messageId = params.get('message_id');
    const ownerId = params.get('owner_id') || '';
    const userId = tg.initDataUnsafe?.user?.id || '';

    function startPayment() {
      const email = document.getElementById('email-input').value.trim();
      if (!email || !email.includes('@')) { alert('Введите корректный email'); return; }
      if (!document.getElementById('agree-terms').checked) { alert('Примите условия оферты'); return; }
      if (!document.getElementById('agree-recurrent').checked) { alert('Подтвердите согласие на автоматическое списание'); return; }

      const btn = document.getElementById('pay-btn');
      btn.disabled = true;
      btn.textContent = '⏳ Открываем оплату...';

      const widget = new cp.CloudPayments();
      widget.pay('auth', {
        publicId: 'pk_76e76d5b40ad717d74b30e7762970',
        description: 'Подписка Анонимные Вопросы — 1 день за 19 ₽',
        amount: 19,
        currency: 'RUB',
        invoiceId: 'anon_' + (messageId || '0') + '_' + Date.now(),
        accountId: String(userId || ownerId),
        email: email,
        data: {
          message_id: messageId,
          user_id: ownerId || String(userId),
          owner_id: ownerId
        }
      }, {
        onSuccess: function() { showSuccess(); },
        onFail: function() {
          btn.disabled = false;
          btn.innerHTML = '🔓 Узнать за 19 ₽';
        }
      });
    }

    function showSuccess() {
      document.getElementById('before-pay').style.display = 'none';
      document.getElementById('after-pay').style.display = 'block';
      setTimeout(() => tg.close(), 4000);
    }
  </script>
</body>
</html>
